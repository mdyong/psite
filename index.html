<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P들의 서재</title>
  <link rel="stylesheet" href="style.css?v=multi2">
</head>
<body>
  <div class="page-shell">
    <main class="page-card intro-layout">
      <div id="intro-backdrop" class="intro-backdrop" aria-hidden="true"></div>
      <section class="hero-panel">
        <p class="eyebrow">P Book Club</p>
        <h1>지금의 취향으로<br>딱 맞는 책을 고를 시간.</h1>
        <p id="intro-stats" class="hero-copy"></p>
        <a class="primary-link" href="./question.html?step=0">추천 시작하기</a>
      </section>
    </main>
  </div>

  <script src="books-data.js?v=20260319b"></script>
  <script src="app-data.js?v=multi2"></script>
  <script>
    (function () {
      var introStats = document.getElementById("intro-stats");
      var introBackdrop = document.getElementById("intro-backdrop");
      var app = window.BookMatchApp;
      if (!app) return;

      var years = app.getYears();
      introStats.textContent = years[0] + "년부터 " + years[years.length - 1] + "년까지 읽은 " + app.books.length + "권의 기록으로 추천을 만듭니다.";

      var sorted = app.books.slice().sort(function (a, b) {
        return Number(b.averageRating) - Number(a.averageRating);
      });

      function renderTrack(items, side) {
        return '<div class="intro-track ' + side + '">' + items.map(function (book) {
          return '<article class="intro-ghost-card"><span>' + book.year + '</span><strong>' + book.title + '</strong></article>';
        }).join("") + '</div>';
      }

      var left = sorted.slice(0, 12).concat(sorted.slice(0, 12));
      var right = sorted.slice(12, 24).concat(sorted.slice(12, 24));
      introBackdrop.innerHTML = renderTrack(left, "left") + renderTrack(right, "right");
    }());
  </script>
</body>
</html>
