<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P들의 서재</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <main class="app-frame">
      <section id="intro-screen" class="screen intro-screen">
        <div id="intro-backdrop" class="intro-backdrop" aria-hidden="true"></div>
        <div class="intro-copy">
          <p class="eyebrow">P Book Club</p>
          <h1>지금의 취향으로<br>딱 맞는 책을 고를 시간.</h1>
          <p id="intro-stats" class="intro-text"></p>
          <button id="start-button" class="primary-button" type="button" onclick="window.beginBookMatch ? window.beginBookMatch() : document.body.classList.add('boot-failed')">추천 시작하기</button>
        </div>
      </section>

      <section id="question-screen" class="screen question-screen hidden">
        <div class="question-head">
          <div class="progress-meta">
            <p class="eyebrow">Question Flow</p>
            <span id="progress-pill" class="progress-pill">1 / 5</span>
          </div>
          <div class="progress-bar">
            <span id="progress-fill"></span>
          </div>
        </div>
        <div id="question-stage" class="question-stage"></div>
      </section>

      <section id="result-screen" class="screen result-screen hidden">
        <div id="result-stage" class="result-stage"></div>
      </section>
    </main>
  </div>

  <script src="books-data.js?v=20260319b"></script>
  <script src="script.js?v=20260319b"></script>
</body>
</html>
